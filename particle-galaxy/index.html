<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Particle Galaxy</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="scene" aria-label="Particle galaxy renderer"></canvas>
  <aside class="panel">
    <h1>Particle Galaxy</h1>
    <label>Seed <input id="seed" type="number" value="42"></label>
    <label>Particle Count <input id="count" type="number" value="1200" min="100" max="5000"></label>
    <label>Radius <input id="radius" type="number" value="220" min="20" max="500"></label>
    <label>Spin <input id="spin" type="number" value="4" min="0" max="12" step="0.1"></label>
    <label>Randomness <input id="randomness" type="number" value="0.25" min="0" max="1" step="0.01"></label>
    <button id="regen" type="button">Regenerate</button>
    <p id="status" class="status neutral">Ready.</p>
    <p id="degraded" class="status warn" hidden>Degraded mode active to preserve frame stability.</p>
  </aside>
  <script src="script.js"></script>
</body>
</html>
