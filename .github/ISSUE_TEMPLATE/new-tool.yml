name: New Tool
description: Create a new widget or tool (web or script)
title: "Create [tool-slug]"
labels:
  - new-tool

body:
  - type: markdown
    attributes:
      value: |
        Dump everything here. Be as messy or detailed as you want.

  - type: input
    id: tool_slug
    attributes:
      label: Tool Slug (folder name + URL)
      placeholder: system-health
      description: kebab-case, no spaces
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What should this tool do? (Free dump)
      description: Goal, target user, functional needs, UI direction, tech stack, examples, references, anything. The more context the better.
      placeholder: |
        I want a tool that helps people quickly see their system info...
        Should work as both a nice web page and also output copyable scripts (bash/ps1/python).
        Make it look clean and modern but minimal, not wack.
        Use HTML/CSS/JS + show the actual scripts.
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Definition of Done / Acceptance Criteria
      description: What must be true for this to be considered complete?
      placeholder: |
        - Tool works at /tool-slug/
        - Looks decent on mobile and desktop
        - Has copy buttons where it makes sense
        - I would actually use it or recommend it
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Extra notes / references
      description: Links, similar tools, things to avoid, hub promotion, etc.
    validations:
      required: false
