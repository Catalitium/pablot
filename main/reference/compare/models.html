<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compare Models — Pablobot</title>
  <meta name="description" content="Compare all AI models by parameters, context length, architecture, and more.">
  <link rel="stylesheet" href="../../style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%23171717'>P</text></svg>">
  <style>
    .compare-table { width: 100%; border-collapse: collapse; margin: 2rem 0; font-size: 0.875rem; }
    .compare-table th, .compare-table td { padding: 0.625rem 0.75rem; text-align: left; border-bottom: 1px solid #e5e5e5; }
    .compare-table th { background: #f5f5f5; font-weight: 600; position: sticky; top: 0; }
    .compare-table tr:hover { background: #fafafa; }
    .compare-table .num { text-align: right; font-variant-numeric: tabular-nums; }
    .compare-table th.sortable { cursor: pointer; user-select: none; }
    .compare-table th.sortable:hover { background: #e5e5e5; }
    .compare-table th.sorted-asc::after { content: " ↑"; }
    .compare-table th.sorted-desc::after { content: " ↓"; }
    .badge { display: inline-block; padding: 0.125rem 0.375rem; border-radius: 3px; font-size: 0.75rem; font-weight: 500; }
    .badge--small { background: #e5e7eb; color: #374151; }
    .badge--medium { background: #dbeafe; color: #1e40af; }
    .badge--large { background: #fef3c7; color: #92400e; }
    .badge--xlarge { background: #fee2e2; color: #991b1b; }
    .arch-tag { display: inline-block; padding: 0.0625rem 0.25rem; background: #f3f4f6; border-radius: 2px; font-size: 0.6875rem; margin-right: 0.125rem; }
    .filters { display: flex; gap: 1rem; margin: 1.5rem 0; flex-wrap: wrap; align-items: center; }
    .filter-select { padding: 0.5rem 1rem; border: 1px solid #d1d5db; border-radius: 6px; font-size: 0.875rem; background: white; }
    .table-wrap { overflow-x: auto; }
  </style>
</head>
<body>
  <header class="header">
    <nav class="header-nav" aria-label="Quick links">
      <a href="/" class="header-nav-btn">← Back to tools</a>
      <a href="../" class="header-nav-btn">← Reference</a>
    </nav>
  </header>

  <main class="main">
    <div class="hero" style="padding-bottom: 1rem;">
      <p class="hero-eyebrow">Compare</p>
      <h1>Model comparison.</h1>
      <p class="hero-lead">Side-by-side comparison of all 37 AI models.</p>
    </div>

    <div class="filters">
      <select id="familyFilter" class="filter-select">
        <option value="all">All families</option>
        <option value="Arcee">Arcee</option>
        <option value="DeepSeek">DeepSeek</option>
        <option value="Google">Google</option>
        <option value="GLM">GLM</option>
        <option value="OpenAI">OpenAI</option>
        <option value="xAI">xAI</option>
        <option value="Moonshot">Moonshot</option>
        <option value="Meta">Meta</option>
        <option value="MiniMax">MiniMax</option>
        <option value="Mistral">Mistral</option>
        <option value="Nvidia">Nvidia</option>
        <option value="AllenAI">AllenAI</option>
        <option value="Qwen">Qwen</option>
        <option value="Others">Others</option>
      </select>
      <select id="sizeFilter" class="filter-select">
        <option value="all">All sizes</option>
        <option value="small">&lt; 10B</option>
        <option value="medium">10B – 100B</option>
        <option value="large">100B – 500B</option>
        <option value="xlarge">&gt; 500B</option>
      </select>
    </div>

    <div class="table-wrap">
      <table class="compare-table" id="compareTable">
        <thead>
          <tr>
            <th class="sortable" data-sort="name">Model</th>
            <th class="sortable" data-sort="family">Family</th>
            <th class="sortable num" data-sort="params">Params</th>
            <th class="sortable" data-sort="context">Context</th>
            <th class="sortable" data-sort="release">Released</th>
            <th>Architecture</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </main>

  <footer class="footer">
    <p class="footer-trust">Open source · Static site · No accounts</p>
    <p class="footer-meta">© 2026 Pablobot</p>
  </footer>

  <script>
    const models = [
      { name: "Trinity Large 400B", family: "Arcee", params: 400, paramsLabel: "400B", context: "128K", release: "2025-02", arch: ["MoE"], id: "arcee-trinity-large-400b" },
      { name: "DeepSeek V3.2 671B", family: "DeepSeek", params: 671, paramsLabel: "671B", context: "200K", release: "2025-01", arch: ["MoE", "MLA"], id: "deepseek-v3-2-671b" },
      { name: "DeepSeek R1 671B", family: "DeepSeek", params: 671, paramsLabel: "671B", context: "200K", release: "2025-01", arch: ["MoE", "RL"], id: "deepseek-r1-671b" },
      { name: "Gemma 3 27B", family: "Google", params: 27, paramsLabel: "27B", context: "128K", release: "2025-03", arch: ["GQA", "SWA"], id: "gemma-3-27b" },
      { name: "GLM 4.5 355B", family: "GLM", params: 355, paramsLabel: "355B", context: "1M", release: "2024-12", arch: ["MoE", "Sparse"], id: "glm-4-5-355b" },
      { name: "GLM 4.7 355B", family: "GLM", params: 355, paramsLabel: "355B", context: "1M", release: "2025-02", arch: ["MoE", "Sparse"], id: "glm-4-7-355b" },
      { name: "GLM 5 744B", family: "GLM", params: 744, paramsLabel: "744B", context: "1M", release: "2025-03", arch: ["MoE", "Sparse"], id: "glm-5-744b" },
      { name: "GPT OSS 120B", family: "OpenAI", params: 120, paramsLabel: "120B", context: "32K", release: "2024-05", arch: ["Dense"], id: "gpt-oss-120b" },
      { name: "GPT OSS 20B", family: "OpenAI", params: 20, paramsLabel: "20B", context: "32K", release: "2024-05", arch: ["Dense"], id: "gpt-oss-20b" },
      { name: "Grok 2.5 270B", family: "xAI", params: 270, paramsLabel: "270B", context: "131K", release: "2024-11", arch: ["MoE"], id: "grok-2-5-270b" },
      { name: "Kimi K2 1T", family: "Moonshot", params: 1000, paramsLabel: "1T", context: "1M", release: "2025-03", arch: ["MoE"], id: "kimi-k2-1t" },
      { name: "Kimi Linear 48B A3B", family: "Moonshot", params: 48, paramsLabel: "48B", context: "1M", release: "2025-02", arch: ["MoE"], id: "kimi-linear-48b-a3b" },
      { name: "Ling 2.5 1T", family: "Others", params: 1000, paramsLabel: "1T", context: "32K", release: "2024-08", arch: ["MoE"], id: "ling-2-5-1t" },
      { name: "Llama 3 8B", family: "Meta", params: 8, paramsLabel: "8B", context: "128K", release: "2024-04", arch: ["Dense", "GQA"], id: "llama-3-8b" },
      { name: "Llama 4 Maverick 400B", family: "Meta", params: 400, paramsLabel: "400B", context: "1M", release: "2025-03", arch: ["MoE", "Gated"], id: "llama-4-maverick-400b" },
      { name: "MiniMax M2 230B", family: "MiniMax", params: 230, paramsLabel: "230B", context: "1M", release: "2025-01", arch: ["MoE"], id: "minimax-m2-230b" },
      { name: "MiniMax M2.5 230B", family: "MiniMax", params: 230, paramsLabel: "230B", context: "1M", release: "2025-02", arch: ["MoE"], id: "minimax-m2-5-230b" },
      { name: "Mistral 3.1 Small 24B", family: "Mistral", params: 24, paramsLabel: "24B", context: "128K", release: "2025-02", arch: ["GQA"], id: "mistral-3-1-small-24b" },
      { name: "Mistral 3 Large 673B", family: "Mistral", params: 673, paramsLabel: "673B", context: "1M", release: "2025-03", arch: ["MoE"], id: "mistral-3-large-673b" },
      { name: "Nanbeige 4.1 3B", family: "Others", params: 3, paramsLabel: "3B", context: "32K", release: "2024-11", arch: ["Dense"], id: "nanbeige-4-1-3b" },
      { name: "Nemotron 3 Nano 30B A3B", family: "Nvidia", params: 30, paramsLabel: "30B", context: "128K", release: "2024-11", arch: ["GQA"], id: "nemotron-3-nano-30b-a3b" },
      { name: "Nemotron 3 Super 120B A12B", family: "Nvidia", params: 120, paramsLabel: "120B", context: "128K", release: "2024-12", arch: ["MoE"], id: "nemotron-3-super-120b-a12b" },
      { name: "OLMo 2 7B", family: "AllenAI", params: 7, paramsLabel: "7B", context: "4K", release: "2024-10", arch: ["Dense"], id: "olmo-2-7b" },
      { name: "OLMo 3 32B", family: "AllenAI", params: 32, paramsLabel: "32B", context: "4K", release: "2025-02", arch: ["Dense"], id: "olmo-3-32b" },
      { name: "OLMo 3 7B", family: "AllenAI", params: 7, paramsLabel: "7B", context: "4K", release: "2025-02", arch: ["Dense"], id: "olmo-3-7b" },
      { name: "Qwen3 235B A22B", family: "Qwen", params: 235, paramsLabel: "235B", context: "32K", release: "2025-03", arch: ["MoE", "Gated"], id: "qwen3-235b-a22b" },
      { name: "Qwen3 32B", family: "Qwen", params: 32, paramsLabel: "32B", context: "32K", release: "2025-03", arch: ["Dense"], id: "qwen3-32b" },
      { name: "Qwen3 4B", family: "Qwen", params: 4, paramsLabel: "4B", context: "32K", release: "2025-03", arch: ["Dense"], id: "qwen3-4b" },
      { name: "Qwen3.5 397B", family: "Qwen", params: 397, paramsLabel: "397B", context: "32K", release: "2024-09", arch: ["MoE", "Gated"], id: "qwen3-5-397b" },
      { name: "Qwen3 8B", family: "Qwen", params: 8, paramsLabel: "8B", context: "32K", release: "2025-03", arch: ["Dense"], id: "qwen3-8b" },
      { name: "Qwen3 Next 80B A3B", family: "Qwen", params: 80, paramsLabel: "80B", context: "32K", release: "2025-02", arch: ["MoE", "Gated"], id: "qwen3-next-80b-a3b" },
      { name: "Sarvam 105B", family: "Others", params: 105, paramsLabel: "105B", context: "32K", release: "2024-12", arch: ["MoE"], id: "sarvam-105b" },
      { name: "Sarvam 30B", family: "Others", params: 30, paramsLabel: "30B", context: "32K", release: "2024-12", arch: ["MoE"], id: "sarvam-30b" },
      { name: "SmolLM3 3B", family: "Others", params: 3, paramsLabel: "3B", context: "4K", release: "2024-10", arch: ["Dense", "NoPE"], id: "smollm3-3b" },
      { name: "Step 3.5 Flash 196B", family: "Others", params: 196, paramsLabel: "196B", context: "1M", release: "2025-01", arch: ["MoE"], id: "step-3-5-flash-196b" },
      { name: "Tiny Aya 3 35B", family: "Others", params: 35, paramsLabel: "35B", context: "4K", release: "2025-01", arch: ["Dense"], id: "tiny-aya-3-35b" },
      { name: "Xiaomi MiMo V2 Flash 309B", family: "Others", params: 309, paramsLabel: "309B", context: "32K", release: "2025-02", arch: ["MoE"], id: "xiaomi-mimo-v2-flash-309b" }
    ];

    function getSizeClass(params) {
      if (params < 10) return "small";
      if (params <= 100) return "medium";
      if (params <= 500) return "large";
      return "xlarge";
    }

    let sortCol = "name";
    let sortAsc = true;

    function parseContext(ctx) {
      if (ctx === "1M") return 1000000;
      return parseInt(ctx.replace("K", "000"));
    }

    function renderTable() {
      const family = document.getElementById("familyFilter").value;
      const size = document.getElementById("sizeFilter").value;
      const tbody = document.querySelector("#compareTable tbody");

      let filtered = models.filter(m => {
        const familyMatch = family === "all" || m.family === family;
        const sizeMatch = size === "all" || getSizeClass(m.params) === size;
        return familyMatch && sizeMatch;
      });

      filtered.sort((a, b) => {
        let va, vb;
        if (sortCol === "name") { va = a.name; vb = b.name; }
        else if (sortCol === "family") { va = a.family; vb = b.family; }
        else if (sortCol === "params") { va = a.params; vb = b.params; }
        else if (sortCol === "context") { va = parseContext(a.context); vb = parseContext(b.context); }
        else if (sortCol === "release") { va = a.release; vb = b.release; }
        else { return 0; }
        if (va < vb) return sortAsc ? -1 : 1;
        if (va > vb) return sortAsc ? 1 : -1;
        return 0;
      });

      tbody.innerHTML = filtered.map(m => `
        <tr>
          <td><a href="../models/${m.id}.html">${m.name}</a></td>
          <td>${m.family}</td>
          <td class="num"><span class="badge badge--${getSizeClass(m.params)}">${m.paramsLabel}</span></td>
          <td>${m.context}</td>
          <td>${m.release}</td>
          <td>${m.arch.map(a => `<span class="arch-tag">${a}</span>`).join("")}</td>
        </tr>
      `).join("");

      document.querySelectorAll(".compare-table th.sortable").forEach(th => {
        th.classList.remove("sorted-asc", "sorted-desc");
        if (th.dataset.sort === sortCol) {
          th.classList.add(sortAsc ? "sorted-asc" : "sorted-desc");
        }
      });
    }

    document.querySelectorAll(".compare-table th.sortable").forEach(th => {
      th.addEventListener("click", () => {
        const col = th.dataset.sort;
        if (sortCol === col) sortAsc = !sortAsc;
        else { sortCol = col; sortAsc = true; }
        renderTable();
      });
    });

    document.getElementById("familyFilter").addEventListener("change", renderTable);
    document.getElementById("sizeFilter").addEventListener("change", renderTable);
    renderTable();
  </script>
</body>
</html>
