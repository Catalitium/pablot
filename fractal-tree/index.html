<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fractal Tree</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="scene" aria-label="Fractal tree scene"></canvas>

  <aside class="dock">
    <h1>Fractal Tree</h1>

    <label>Depth
      <input id="depth" type="number" min="1" max="10" value="7">
    </label>

    <label>Branch Angle
      <input id="angle" type="range" min="5" max="60" value="24" step="1">
      <span id="angleLabel">24°</span>
    </label>

    <label>Branch Scale
      <input id="scale" type="range" min="0.45" max="0.82" value="0.69" step="0.01">
      <span id="scaleLabel">0.69</span>
    </label>

    <div class="actions">
      <button id="regen" type="button">Regenerate</button>
      <button id="reset" type="button">Reset</button>
    </div>

    <p id="status" class="status neutral">Ready.</p>
    <p id="warning" class="status warn" hidden>Input exceeded cap; values were clamped.</p>
  </aside>

  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
