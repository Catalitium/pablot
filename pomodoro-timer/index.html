<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Pomodoro Timer</title><link rel="stylesheet" href="style.css"></head>
<body><main class="app"><h1>Pomodoro Timer</h1>
<section class="panel">
<div class="display"><span id="mode">Work</span><strong id="time">25:00</strong><p>Cycle: <span id="cycle">1</span></p></div>
<div class="buttons"><button id="start">Start</button><button id="pause">Pause</button><button id="reset">Reset</button></div>
</section>
<section class="panel settings">
<label>Work (min)<input id="work" type="number" min="1" max="120" value="25"></label>
<label>Short Break (min)<input id="short" type="number" min="1" max="60" value="5"></label>
<label>Long Break (min)<input id="long" type="number" min="1" max="90" value="15"></label>
<label>Long Break Every<input id="interval" type="number" min="2" max="8" value="4"></label>
<button id="save">Save Settings</button>
<p id="status"></p>
</section></main><script src="script.js"></script></body></html>
