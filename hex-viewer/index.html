<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hex Viewer</title>
  <style>
    :root { --bg: #0d1117; --surface: #161b22; --border: #30363d; --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff; --green: #3fb950; --purple: #a371f7; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'JetBrains Mono', monospace; background: var(--bg); color: var(--text); min-height: 100vh; padding:rem; }
    1.5 .container { max-width: 1200px; margin: 0 auto; }
    h1 { font-size: 1.2rem; color: var(--accent); margin-bottom: 1rem; }
    .toolbar { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
    button, .file-btn { padding: 0.6rem 1rem; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; font-size: 0.8rem; }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-secondary { background: var(--surface); border: 1px solid var(--border); color: var(--text); }
    input[type="file"] { display: none; }
    .view { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .hex-row { display: grid; grid-template-columns: 80px 1fr 200px; gap: 1rem; padding: 0.5rem; border-bottom: 1px solid var(--border); }
    .hex-row:last-child { border-bottom: none; }
    .offset { color: var(--muted); font-size: 0.8rem; }
    .hex-bytes { display: flex; flex-wrap: wrap; gap: 0.3rem; }
    .byte { padding: 0.2rem 0.4rem; border-radius: 3px; background: var(--bg); font-size: 0.8rem; }
    .byte.printable { color: var(--green); background: rgba(63, 185, 80, 0.1); }
    .byte.null { color: var(--muted); }
    .ascii { color: var(--muted); font-size: 0.8rem; word-break: break-all; }
    .stats { display: flex; gap: 1rem; margin-bottom: 1rem; color: var(--muted); font-size: 0.8rem; }
    .info { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; margin-bottom: 1rem; }
    .info-box { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 0.75rem; text-align: center; }
    .info-val { font-size: 1.1rem; color: var(--accent); }
    .info-label { font-size: 0.65rem; color: var(--muted); }
  </style>
</head>
<body>
  <div class="container">
    <h1>Hex Viewer</h1>

    <div class="toolbar">
      <button class="btn-primary" onclick="document.getElementById('fileInput').click()">📁 Open File</button>
      <input type="file" id="fileInput" onchange="loadFile(this)">
      <button class="btn-secondary" onclick="loadSample()">Sample Data</button>
      <button class="btn-secondary" onclick="clearView()">Clear</button>
    </div>

    <div class="info" id="info" style="display:none">
      <div class="info-box"><div class="info-val" id="fileSize">0</div><div class="info-label">Size</div></div>
      <div class="info-box"><div class="info-val" id="byteCount">0</div><div class="info-label">Bytes</div></div>
      <div class="info-box"><div class="info-val" id="rowCount">0</div><div class="info-label">Rows</div></div>
      <div class="info-box"><div class="info-val" id="printable">0%</div><div class="info-label">Printable</div></div>
    </div>

    <div class="view" id="hexView">
      <p style="padding:2rem;color:var(--muted);text-align:center">Open a file or load sample data</p>
    </div>
  </div>

  <script>
    const BYTES_PER_ROW = 16;

    function toHex(byte) {
      return byte.toString(16).padStart(2, '0').toUpperCase();
    }

    function isPrintable(byte) {
      return byte >= 32 && byte <= 126;
    }

    function toAscii(byte) {
      return isPrintable(byte) ? String.fromCharCode(byte) : '.';
    }

    function renderHex(data) {
      const view = document.getElementById('hexView');
      const info = document.getElementById('info');

      if (!data || data.length === 0) {
        view.innerHTML = '<p style="padding:2rem;color:var(--muted);text-align:center">No data</p>';
        return;
      }

      info.style.display = 'grid';
      document.getElementById('fileSize').textContent = formatSize(data.length);
      document.getElementById('byteCount').textContent = data.length.toLocaleString();

      let html = '';
      const rows = Math.ceil(data.length / BYTES_PER_ROW);
      document.getElementById('rowCount').textContent = rows.toLocaleString();

      let printableCount = 0;

      for (let i = 0; i < rows; i++) {
        const offset = i * BYTES_PER_ROW;
        const rowData = data.slice(offset, offset + BYTES_PER_ROW);
        const offsetStr = offset.toString(16).padStart(8, '0').toUpperCase();

        let hexHtml = '';
        let asciiStr = '';

        for (let j = 0; j < BYTES_PER_ROW; j++) {
          if (j < rowData.length) {
            const byte = rowData[j];
            hexHtml += `<span class="byte ${isPrintable(byte) ? 'printable' : byte === 0 ? 'null' : ''}">${toHex(byte)}</span>`;
            asciiStr += toAscii(byte);
            if (isPrintable(byte)) printableCount++;
          } else {
            hexHtml += '<span class="byte">  </span>';
            asciiStr += ' ';
          }
        }

        html += `<div class="hex-row">
          <span class="offset">${offsetStr}</span>
          <span class="hex-bytes">${hexHtml}</span>
          <span class="ascii">${asciiStr}</span>
        </div>`;
      }

      document.getElementById('printable').textContent = Math.round(printableCount / data.length * 100) + '%';
      view.innerHTML = html;
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function loadFile(input) {
      const file = input.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        const data = new Uint8Array(e.target.result);
        renderHex(data);
      };
      reader.readAsArrayBuffer(file);
    }

    function loadSample() {
      // Generate sample binary data
      const data = new Uint8Array(512);
      for (let i = 0; i < 256; i++) {
        data[i] = i; // 0x00-0xFF
      }
      // Add some ASCII text
      const text = "Hello, World! This is sample binary data.\n";
      for (let i = 0; i < text.length && i + 256 < 512; i++) {
        data[i + 256] = text.charCodeAt(i);
      }
      // Fill rest with zeros
      for (let i = 256 + text.length; i < 512; i++) {
        data[i] = 0;
      }
      renderHex(data);
    }

    function clearView() {
      document.getElementById('hexView').innerHTML = '<p style="padding:2rem;color:var(--muted);text-align:center">Open a file or load sample data</p>';
      document.getElementById('info').style.display = 'none';
    }
  </script>
</body>
</html>
