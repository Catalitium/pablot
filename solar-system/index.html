<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solar System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="scene" aria-label="Solar system scene"></canvas>

  <aside class="controls">
    <h1>Solar System</h1>
    <label for="timeScale">Time Scale</label>
    <input id="timeScale" type="range" min="0.1" max="5" value="1" step="0.1">
    <p id="timeScaleLabel">1.0x</p>
    <div class="actions">
      <button id="pauseBtn" type="button">Pause</button>
      <button id="resumeBtn" type="button">Resume</button>
    </div>
    <p id="status" class="status">Ready.</p>
  </aside>

  <aside class="info" id="infoPanel">
    <h2 id="planetName">No planet selected</h2>
    <p id="planetData">Tap/click a planet to view details.</p>
  </aside>

  <script src="script.js"></script>
</body>
</html>
