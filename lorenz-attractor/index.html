<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Lorenz Attractor</title><link rel="stylesheet" href="style.css"></head>
<body><main class="app"><h1>Lorenz Attractor</h1>
<section class="panel controls"><label>sigma <input id="sigma" type="number" step="0.1" value="10"></label><label>rho <input id="rho" type="number" step="0.1" value="28"></label><label>beta <input id="beta" type="number" step="0.01" value="2.67"></label><label>dt <input id="dt" type="number" step="0.001" value="0.01"></label><button id="reset">Reset</button><p id="status"></p></section>
<canvas id="plot" width="900" height="420"></canvas>
</main><script src="script.js"></script></body></html>
