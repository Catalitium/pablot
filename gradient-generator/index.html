<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gradient Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <h1>Gradient Generator</h1>
    <section class="controls panel">
      <label>Type
        <select id="type"><option value="linear">linear-gradient</option><option value="radial">radial-gradient</option></select>
      </label>
      <label>Angle
        <input id="angle" type="number" min="0" max="360" value="90">
      </label>
      <label>Preset
        <select id="preset"></select>
      </label>
      <div id="stops"></div>
      <button id="addStop" type="button">Add Stop</button>
      <button id="copyCss" type="button">Copy CSS</button>
    </section>
    <section class="panel">
      <div id="preview" class="preview"></div>
      <pre id="output"></pre>
      <p id="status" role="status" aria-live="polite"></p>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
