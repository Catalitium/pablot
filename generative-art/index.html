<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generative Art Studio - Pablot</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%23333'>🎨</text></svg>">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #1a1a1a;
      --accent: #00ff88;
      --text: #ffffff;
      --text-secondary: #888;
      --border: #2a2a2a;
      --gradient: linear-gradient(135deg, #ff006e, #8338ec, #3a86ff);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .container {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .header {
      padding: 20px;
      background: linear-gradient(180deg, rgba(0,255,136,0.1) 0%, transparent 100%);
      border-bottom: 1px solid var(--border);
    }

    .title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      background: var(--gradient);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 20px;
    }

    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .control-group label {
      font-size: 12px;
      color: var(--text-secondary);
      white-space: nowrap;
    }

    select, input[type="range"], input[type="color"] {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 6px 10px;
      font-size: 12px;
    }

    select {
      cursor: pointer;
    }

    input[type="range"] {
      width: 80px;
    }

    input[type="color"] {
      width: 40px;
      height: 30px;
      cursor: pointer;
    }

    .btn {
      padding: 8px 16px;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(0,255,136,0.3);
    }

    .btn.secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn.secondary:hover {
      border-color: var(--accent);
    }

    .canvas-container {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, rgba(0,255,136,0.05) 0%, transparent 70%);
    }

    canvas {
      max-width: 90%;
      max-height: 90%;
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }

    .mode-indicator {
      position: absolute;
      top: 20px;
      right: 20px;
      padding: 8px 16px;
      background: rgba(0,255,136,0.2);
      border: 1px solid var(--accent);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .back-link {
      position: absolute;
      top: 20px;
      left: 20px;
      color: var(--text);
      text-decoration: none;
      opacity: 0.7;
      font-size: 14px;
    }

    .back-link:hover {
      opacity: 1;
    }

    .info-panel {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      font-size: 11px;
      color: var(--text-secondary);
      max-width: 200px;
    }

    .info-panel div {
      margin-bottom: 4px;
    }

    .info-panel .label {
      font-weight: 600;
      color: var(--text);
    }

    .preset-buttons {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .preset-btn {
      padding: 4px 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .preset-btn:hover {
      border-color: var(--accent);
    }

    .preset-btn.active {
      background: var(--accent);
      color: var(--bg);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <a href="../" class="back-link">← Back to Pablot</a>
      <h1 class="title">Generative Art Studio</h1>
      <p class="subtitle">Interactive mathematical and algorithmic art generation</p>
      
      <div class="controls">
        <div class="control-group">
          <label>Mode:</label>
          <select id="artMode" onchange="changeMode()">
            <option value="fractal">Fractal Tree</option>
            <option value="lorenz">Lorenz Attractor</option>
            <option value="dna">DNA Helix</option>
            <option value="particles">Particle System</option>
          </select>
        </div>

        <div class="control-group">
          <label>Speed:</label>
          <input type="range" id="speed" min="1" max="100" value="50" oninput="updateSpeed()">
        </div>

        <div class="control-group">
          <label>Complexity:</label>
          <input type="range" id="complexity" min="1" max="100" value="50" oninput="updateComplexity()">
        </div>

        <div class="control-group">
          <label>Color:</label>
          <input type="color" id="colorScheme" value="#00ff88" onchange="updateColor()">
        </div>

        <button class="btn" onclick="toggleAnimation()">Play/Pause</button>
        <button class="btn secondary" onclick="resetArt()">Reset</button>
        <button class="btn secondary" onclick="saveArt()">Save Image</button>
      </div>

      <div class="preset-buttons">
        <button class="preset-btn" onclick="loadPreset('zen')">Zen Garden</button>
        <button class="preset-btn" onclick="loadPreset('chaos')">Chaos Theory</button>
        <button class="preset-btn" onclick="loadPreset('organic')">Organic Growth</button>
        <button class="preset-btn" onclick="loadPreset('tech')">Tech Noir</button>
      </div>
    </div>

    <div class="canvas-container">
      <div class="mode-indicator" id="modeIndicator">Fractal Tree</div>
      <canvas id="artCanvas"></canvas>
      
      <div class="info-panel">
        <div><span class="label">Mode:</span> <span id="currentMode">Fractal Tree</span></div>
        <div><span class="label">Particles:</span> <span id="particleCount">0</span></div>
        <div><span class="label">FPS:</span> <span id="fps">60</span></div>
        <div><span class="label">Time:</span> <span id="elapsedTime">0:00</span></div>
      </div>
    </div>
  </div>

  <script>
    let canvas, ctx;
    let animationId;
    let isPlaying = true;
    let currentMode = 'fractal';
    let speed = 50;
    let complexity = 50;
    let colorScheme = '#00ff88';
    let startTime = Date.now();
    let lastFrameTime = Date.now();
    let frameCount = 0;
    let fps = 60;

    // Mode-specific variables
    let trees = [];
    let particles = [];
    let lorenzPoints = [];
    let dnaHelix = [];

    function init() {
      canvas = document.getElementById('artCanvas');
      ctx = canvas.getContext('2d');
      
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);
      
      initializeMode();
      animate();
    }

    function resizeCanvas() {
      canvas.width = window.innerWidth * 0.9;
      canvas.height = window.innerHeight * 0.7;
    }

    function initializeMode() {
      trees = [];
      particles = [];
      lorenzPoints = [];
      dnaHelix = [];

      switch (currentMode) {
        case 'fractal':
          initializeFractalTree();
          break;
        case 'lorenz':
          initializeLorenz();
          break;
        case 'dna':
          initializeDNA();
          break;
        case 'particles':
          initializeParticles();
          break;
      }
    }

    function initializeFractalTree() {
      trees = [{
        x: canvas.width / 2,
        y: canvas.height,
        angle: -Math.PI / 2,
        depth: 0,
        length: 100,
        maxDepth: Math.floor(complexity / 10) + 5
      }];
    }

    function initializeLorenz() {
      lorenzPoints = [];
      let x = 0.1, y = 0, z = 0;
      const dt = 0.01;
      const sigma = 10, rho = 28, beta = 8/3;

      for (let i = 0; i < 5000; i++) {
        const dx = sigma * (y - x) * dt;
        const dy = (x * (rho - z) - y) * dt;
        const dz = (x * y - beta * z) * dt;
        
        x += dx;
        y += dy;
        z += dz;
        
        lorenzPoints.push({x, y, z});
      }
    }

    function initializeDNA() {
      dnaHelix = [];
      const points = 200;
      const radius = 50;
      
      for (let i = 0; i < points; i++) {
        const t = (i / points) * Math.PI * 4;
        dnaHelix.push({
          x1: Math.cos(t) * radius,
          y1: (i / points) * canvas.height * 0.8 - canvas.height * 0.4,
          z1: Math.sin(t) * radius,
          x2: Math.cos(t + Math.PI) * radius,
          y2: (i / points) * canvas.height * 0.8 - canvas.height * 0.4,
          z2: Math.sin(t + Math.PI) * radius
        });
      }
    }

    function initializeParticles() {
      particles = [];
      const count = Math.floor(complexity * 2) + 50;
      
      for (let i = 0; i < count; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          vx: (Math.random() - 0.5) * 2,
          vy: (Math.random() - 0.5) * 2,
          size: Math.random() * 3 + 1,
          hue: Math.random() * 60 + 120,
          life: 1
        });
      }
    }

    function animate() {
      if (!isPlaying) {
        animationId = requestAnimationFrame(animate);
        return;
      }

      // Clear canvas with trail effect
      ctx.fillStyle = 'rgba(10, 10, 10, 0.05)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      switch (currentMode) {
        case 'fractal':
          drawFractalTree();
          break;
        case 'lorenz':
          drawLorenz();
          break;
        case 'dna':
          drawDNA();
          break;
        case 'particles':
          drawParticles();
          break;
      }

      updateStats();
      animationId = requestAnimationFrame(animate);
    }

    function drawFractalTree() {
      const newTrees = [];
      
      trees.forEach(tree => {
        if (tree.depth < tree.maxDepth) {
          const endX = tree.x + Math.cos(tree.angle) * tree.length;
          const endY = tree.y + Math.sin(tree.angle) * tree.length;
          
          ctx.strokeStyle = `hsl(${120 + tree.depth * 10}, 70%, ${50 + tree.depth * 5}%)`;
          ctx.lineWidth = Math.max(1, tree.maxDepth - tree.depth);
          ctx.beginPath();
          ctx.moveTo(tree.x, tree.y);
          ctx.lineTo(endX, endY);
          ctx.stroke();
          
          if (Math.random() < speed / 100) {
            const angleVariation = (Math.random() - 0.5) * Math.PI / 6;
            newTrees.push({
              x: endX,
              y: endY,
              angle: tree.angle - Math.PI / 6 + angleVariation,
              depth: tree.depth + 1,
              length: tree.length * 0.7,
              maxDepth: tree.maxDepth
            });
            newTrees.push({
              x: endX,
              y: endY,
              angle: tree.angle + Math.PI / 6 + angleVariation,
              depth: tree.depth + 1,
              length: tree.length * 0.7,
              maxDepth: tree.maxDepth
            });
          }
        }
      });
      
      trees = newTrees;
      
      if (trees.length === 0) {
        initializeFractalTree();
      }
    }

    function drawLorenz() {
      const centerX = canvas.width / 2;
      const centerY = canvas.height / 2;
      const scale = 10;
      
      ctx.strokeStyle = colorScheme;
      ctx.lineWidth = 1;
      ctx.globalAlpha = 0.8;
      
      ctx.beginPath();
      lorenzPoints.forEach((point, i) => {
        const x = centerX + point.x * scale;
        const y = centerY + point.y * scale;
        
        if (i === 0) {
          ctx.moveTo(x, y);
        } else {
          ctx.lineTo(x, y);
        }
      });
      ctx.stroke();
      ctx.globalAlpha = 1;
      
      // Rotate points
      const rotationSpeed = speed / 10000;
      lorenzPoints = lorenzPoints.map(point => ({
        x: point.x * Math.cos(rotationSpeed) - point.z * Math.sin(rotationSpeed),
        y: point.y,
        z: point.x * Math.sin(rotationSpeed) + point.z * Math.cos(rotationSpeed)
      }));
    }

    function drawDNA() {
      const centerX = canvas.width / 2;
      const centerY = canvas.height / 2;
      const time = Date.now() * 0.001 * (speed / 50);
      
      dnaHelix.forEach((point, i) => {
        const t = (i / dnaHelix.length) * Math.PI * 4 + time;
        
        ctx.strokeStyle = colorScheme;
        ctx.lineWidth = 2;
        
        // Draw first strand
        ctx.beginPath();
        ctx.arc(
          centerX + Math.cos(t) * 50,
          centerY + point.y1,
          3,
          0,
          Math.PI * 2
        );
        ctx.stroke();
        
        // Draw second strand
        ctx.beginPath();
        ctx.arc(
          centerX + Math.cos(t + Math.PI) * 50,
          centerY + point.y2,
          3,
          0,
          Math.PI * 2
        );
        ctx.stroke();
        
        // Draw connections
        if (i % 10 === 0) {
          ctx.strokeStyle = `${colorScheme}88`;
          ctx.beginPath();
          ctx.moveTo(centerX + Math.cos(t) * 50, centerY + point.y1);
          ctx.lineTo(centerX + Math.cos(t + Math.PI) * 50, centerY + point.y2);
          ctx.stroke();
        }
      });
    }

    function drawParticles() {
      particles.forEach((particle, index) => {
        particle.x += particle.vx * (speed / 50);
        particle.y += particle.vy * (speed / 50);
        particle.life -= 0.01;
        
        // Bounce off walls
        if (particle.x < 0 || particle.x > canvas.width) particle.vx *= -1;
        if (particle.y < 0 || particle.y > canvas.height) particle.vy *= -1;
        
        // Draw particle
        ctx.fillStyle = `hsla(${particle.hue}, 70%, 50%, ${particle.life})`;
        ctx.beginPath();
        ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
        ctx.fill();
        
        // Draw connections
        particles.forEach((other, otherIndex) => {
          if (index !== otherIndex) {
            const distance = Math.sqrt(
              Math.pow(particle.x - other.x, 2) + 
              Math.pow(particle.y - other.y, 2)
            );
            
            if (distance < 100) {
              ctx.strokeStyle = `hsla(${particle.hue}, 70%, 50%, ${(1 - distance / 100) * particle.life * 0.5})`;
              ctx.lineWidth = 1;
              ctx.beginPath();
              ctx.moveTo(particle.x, particle.y);
              ctx.lineTo(other.x, other.y);
              ctx.stroke();
            }
          }
        });
        
        // Respawn dead particles
        if (particle.life <= 0) {
          particle.x = Math.random() * canvas.width;
          particle.y = Math.random() * canvas.height;
          particle.life = 1;
          particle.vx = (Math.random() - 0.5) * 2;
          particle.vy = (Math.random() - 0.5) * 2;
        }
      });
    }

    function updateStats() {
      // Update FPS
      frameCount++;
      const now = Date.now();
      if (now - lastFrameTime >= 1000) {
        fps = frameCount;
        frameCount = 0;
        lastFrameTime = now;
        document.getElementById('fps').textContent = fps;
      }
      
      // Update elapsed time
      const elapsed = Math.floor((now - startTime) / 1000);
      const minutes = Math.floor(elapsed / 60);
      const seconds = elapsed % 60;
      document.getElementById('elapsedTime').textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
      
      // Update particle count
      document.getElementById('particleCount').textContent = particles.length;
    }

    function changeMode() {
      currentMode = document.getElementById('artMode').value;
      const modeNames = {
        'fractal': 'Fractal Tree',
        'lorenz': 'Lorenz Attractor',
        'dna': 'DNA Helix',
        'particles': 'Particle System'
      };
      document.getElementById('modeIndicator').textContent = modeNames[currentMode];
      document.getElementById('currentMode').textContent = modeNames[currentMode];
      
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      initializeMode();
    }

    function updateSpeed() {
      speed = parseInt(document.getElementById('speed').value);
    }

    function updateComplexity() {
      complexity = parseInt(document.getElementById('complexity').value);
      initializeMode();
    }

    function updateColor() {
      colorScheme = document.getElementById('colorScheme').value;
    }

    function toggleAnimation() {
      isPlaying = !isPlaying;
    }

    function resetArt() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      startTime = Date.now();
      initializeMode();
    }

    function saveArt() {
      const link = document.createElement('a');
      link.download = `generative-art-${currentMode}-${Date.now()}.png`;
      link.href = canvas.toDataURL();
      link.click();
    }

    function loadPreset(preset) {
      // Remove active class from all preset buttons
      document.querySelectorAll('.preset-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      
      switch (preset) {
        case 'zen':
          document.getElementById('artMode').value = 'fractal';
          document.getElementById('speed').value = 20;
          document.getElementById('complexity').value = 30;
          document.getElementById('colorScheme').value = '#00ff88';
          break;
        case 'chaos':
          document.getElementById('artMode').value = 'lorenz';
          document.getElementById('speed').value = 80;
          document.getElementById('complexity').value = 70;
          document.getElementById('colorScheme').value = '#ff006e';
          break;
        case 'organic':
          document.getElementById('artMode').value = 'dna';
          document.getElementById('speed').value = 40;
          document.getElementById('complexity').value = 50;
          document.getElementById('colorScheme').value = '#3a86ff';
          break;
        case 'tech':
          document.getElementById('artMode').value = 'particles';
          document.getElementById('speed').value = 60;
          document.getElementById('complexity').value = 80;
          document.getElementById('colorScheme').value = '#8338ec';
          break;
      }
      
      changeMode();
      updateSpeed();
      updateComplexity();
      updateColor();
    }

    // Initialize on load
    window.addEventListener('load', init);
  </script>
</body>
</html>
