<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Token Counter — LLM Token Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0c10;
      --bg-secondary: #14141c;
      --bg-panel: #1c1c28;
      --border: #2a2a3a;
      --text: #f0f0f5;
      --text-secondary: #9898b0;
      --text-muted: #5a5a70;
      --accent: #8b5cf6;
      --accent-glow: rgba(139, 92, 246, 0.3);
      --success: #10b981;
      --radius: 12px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    .container { max-width: 900px; margin: 0 auto; padding: 2rem; }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
    }

    .logo { display: flex; align-items: center; gap: 0.75rem; }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--accent), #a855f7);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }

    h1 { font-size: 1.5rem; }
    .subtitle { color: var(--text-muted); font-size: 0.85rem; }

    .panel {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 1.25rem;
    }

    .panel-head {
      padding: 1rem 1.25rem;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .panel-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
    }

    .char-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .panel-body { padding: 1.25rem; }

    textarea {
      width: 100%;
      min-height: 180px;
      padding: 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      line-height: 1.7;
      resize: vertical;
    }

    textarea:focus { outline: none; border-color: var(--accent); }

    .btn-row {
      display: flex;
      gap: 0.75rem;
      margin-top: 1rem;
    }

    .btn {
      flex: 1;
      padding: 0.875rem;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      color: white;
      box-shadow: 0 4px 15px var(--accent-glow);
    }

    .btn-primary:hover { transform: translateY(-2px); }

    .btn-secondary {
      background: var(--bg-panel);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover { color: var(--text); }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }

    @media (max-width: 600px) { .results-grid { grid-template-columns: 1fr; } }

    .result-card {
      background: var(--bg-panel);
      border-radius: 8px;
      padding: 1.25rem;
      text-align: center;
    }

    .result-val {
      font-size: 1.75rem;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
    }

    .result-val.purple { color: var(--accent); }
    .result-val.green { color: var(--success); }

    .result-label {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-top: 0.25rem;
    }

    .method-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
      margin-top: 1rem;
    }

    @media (max-width: 600px) { .method-cards { grid-template-columns: 1fr; } }

    .method-card {
      background: var(--bg-panel);
      border-radius: 8px;
      padding: 1rem;
      text-align: center;
    }

    .method-name {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 0.25rem;
    }

    .method-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.1rem;
      color: var(--text-secondary);
    }

    .model-select {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 0.5rem;
      margin-top: 1rem;
    }

    .model-btn {
      padding: 0.5rem;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-secondary);
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .model-btn:hover { border-color: var(--accent); }
    .model-btn.selected { background: var(--accent); border-color: var(--accent); color: white; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <div class="logo-icon">🔢</div>
        <div>
          <h1>Token Counter</h1>
          <p class="subtitle">Estimate tokens and API costs for LLM inputs</p>
        </div>
      </div>
    </header>

    <div class="panel">
      <div class="panel-head">
        <span class="panel-title">Input Text</span>
        <span class="char-count" id="charCount">0 chars | 0 words</span>
      </div>
      <div class="panel-body">
        <textarea id="inputText" placeholder="Paste or type your text here..."></textarea>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="countTokens()">Count Tokens</button>
          <button class="btn btn-secondary" onclick="clearInput()">Clear</button>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <span class="panel-title">Results</span>
      </div>
      <div class="panel-body">
        <div class="results-grid">
          <div class="result-card">
            <div class="result-val purple" id="totalTokens">0</div>
            <div class="result-label">Est. Tokens</div>
          </div>
          <div class="result-card">
            <div class="result-val green" id="estCost">$0.00</div>
            <div class="result-label">Est. Cost</div>
          </div>
          <div class="result-card">
            <div class="result-val purple" id="totalChars">0</div>
            <div class="result-label">Characters</div>
          </div>
        </div>

        <div class="method-cards">
          <div class="method-card">
            <div class="method-name">Chars / 4</div>
            <div class="method-val" id="method1">0</div>
          </div>
          <div class="method-card">
            <div class="method-name">Words × 1.33</div>
            <div class="method-val" id="method2">0</div>
          </div>
          <div class="method-card">
            <div class="method-name">Words</div>
            <div class="method-val" id="wordCount">0</div>
          </div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <span class="panel-title">Cost by Model</span>
      </div>
      <div class="panel-body">
        <div class="model-select" id="modelSelect"></div>
        <div id="costBreakdown" style="margin-top: 1rem;"></div>
      </div>
    </div>
  </div>

  <script>
    const models = [
      { id: 'gpt-4', name: 'GPT-4', input: 0.03, output: 0.06 },
      { id: 'gpt-3.5-turbo', name: 'GPT-3.5', input: 0.0015, output: 0.002 },
      { id: 'claude-opus', name: 'Claude 3 Opus', input: 0.015, output: 0.075 },
      { id: 'claude-sonnet', name: 'Claude 3 Sonnet', input: 0.003, output: 0.015 },
      { id: 'claude-haiku', name: 'Claude 3 Haiku', input: 0.00025, output: 0.00125 },
      { id: 'gemini-pro', name: 'Gemini Pro', input: 0.00125, output: 0.005 }
    ];

    function init() {
      renderModels();
      document.getElementById('inputText').addEventListener('input', updateCharCount);
    }

    function renderModels() {
      document.getElementById('modelSelect').innerHTML = models.map(m => `
        <button class="model-btn" data-id="${m.id}">${m.name}</button>
      `).join('');
    }

    function updateCharCount() {
      const text = document.getElementById('inputText').value;
      const chars = text.length;
      const words = text.trim() ? text.trim().split(/\s+/).length : 0;
      document.getElementById('charCount').textContent = `${chars.toLocaleString()} chars | ${words.toLocaleString()} words`;
    }

    function countTokens() {
      const text = document.getElementById('inputText').value;
      if (!text.trim()) return;

      const chars = text.length;
      const words = text.trim().split(/\s+/).length;

      // Different estimation methods
      const method1 = Math.ceil(chars / 4); // chars / 4
      const method2 = Math.ceil(words / 0.75); // words / 0.75
      const avgTokens = Math.round((method1 + method2) / 2);

      // Update UI
      document.getElementById('totalTokens').textContent = avgTokens.toLocaleString();
      document.getElementById('totalChars').textContent = chars.toLocaleString();
      document.getElementById('method1').textContent = method1.toLocaleString();
      document.getElementById('method2').textContent = method2.toLocaleString();
      document.getElementById('wordCount').textContent = words.toLocaleString();

      // Estimate cost (using avg tokens as input)
      const estCost = (avgTokens / 1000) * 0.003;
      document.getElementById('estCost').textContent = '$' + estCost.toFixed(4);

      // Cost breakdown
      let breakdown = '<div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.5rem;">';
      models.forEach(m => {
        const cost = (avgTokens / 1000) * m.input;
        breakdown += `<div style="background: var(--bg-panel); padding: 0.5rem; border-radius: 6px; display: flex; justify-content: space-between; font-size: 0.85rem;">
          <span style="color: var(--text-secondary);">${m.name}</span>
          <span style="font-family: 'JetBrains Mono', monospace; color: var(--accent);">$${cost.toFixed(4)}</span>
        </div>`;
      });
      breakdown += '</div>';
      document.getElementById('costBreakdown').innerHTML = breakdown;
    }

    function clearInput() {
      document.getElementById('inputText').value = '';
      updateCharCount();
      document.getElementById('totalTokens').textContent = '0';
      document.getElementById('totalChars').textContent = '0';
      document.getElementById('estCost').textContent = '$0.00';
      document.getElementById('method1').textContent = '0';
      document.getElementById('method2').textContent = '0';
      document.getElementById('wordCount').textContent = '0';
      document.getElementById('costBreakdown').innerHTML = '';
    }

    init();
  </script>
</body>
</html>
