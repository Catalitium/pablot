<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebSocket Tester</title>
  <style>
    :root { --bg: #0d1117; --surface: #161b22; --border: #30363d; --text: #e6edf3; --muted: #8b949e; --green: #3fb950; --red: #f85149; --yellow: #d29922; --blue: #58a6ff; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'JetBrains Mono', monospace; background: var(--bg); color: var(--text); min-height: 100vh; padding: 1.5rem; }
    .container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 300px 1fr 300px; gap: 1rem; }
    @media (max-width: 900px) { .container { grid-template-columns: 1fr; } }
    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; }
    h1 { font-size: 1.1rem; color: var(--blue); margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
    .connect-row { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    input { flex: 1; padding: 0.6rem; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-family: inherit; font-size: 0.85rem; }
    button { padding: 0.6rem 1rem; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; font-size: 0.8rem; }
    .btn-connect { background: var(--green); color: #000; }
    .btn-connect:hover { background: #2ea043; }
    .btn-disconnect { background: var(--red); color: #fff; }
    .btn-send { background: var(--blue); color: #fff; }
    .btn-clear { background: var(--border); color: var(--muted); }
    .status { display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem; margin-bottom: 1rem; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
    .status-dot.connected { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .status-dot.error { background: var(--red); }
    .log { height: 400px; overflow-y: auto; font-size: 0.8rem; }
    .log-entry { padding: 0.4rem; border-bottom: 1px solid var(--border); display: flex; gap: 0.5rem; }
    .log-entry.sent { color: var(--green); }
    .log-entry.received { color: var(--blue); }
    .log-entry.system { color: var(--yellow); }
    .log-entry.error { color: var(--red); }
    .log-time { color: var(--muted); font-size: 0.7rem; }
    textarea { width: 100%; min-height: 100px; padding: 0.75rem; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-family: inherit; font-size: 0.85rem; resize: vertical; }
    .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
    .metric { background: var(--bg); padding: 0.75rem; border-radius: 6px; text-align: center; }
    .metric-val { font-size: 1.2rem; font-weight: bold; color: var(--blue); }
    .metric-label { font-size: 0.65rem; color: var(--muted); }
    .presets { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .preset { padding: 0.3rem 0.6rem; border-radius: 4px; background: var(--bg); border: 1px solid var(--border); color: var(--muted); font-size: 0.7rem; cursor: pointer; }
    .preset:hover { border-color: var(--blue); color: var(--blue); }
  </style>
</head>
<body>
  <div class="container">
    <div class="panel">
      <h1>🔌 WebSocket Tester</h1>
      <div class="connect-row">
        <input type="text" id="url" placeholder="ws://localhost:8080" value="wss://echo.websocket.org">
        <button class="btn-connect" id="connectBtn" onclick="toggleConnect()">Connect</button>
      </div>
      <div class="status">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Disconnected</span>
      </div>
      <h3 style="font-size:0.8rem;color:var(--muted);margin-bottom:0.5rem">Presets</h3>
      <div class="presets">
        <span class="preset" onclick="setUrl('wss://echo.websocket.org')">Echo</span>
        <span class="preset" onclick="setUrl('wss://ws.postman-echo.com/raw')">Postman</span>
      </div>
    </div>

    <div class="panel">
      <h1>💬 Messages</h1>
      <textarea id="message" placeholder='{"type": "hello", "data": {}}'></textarea>
      <div style="display:flex;gap:0.5rem;margin-top:0.5rem">
        <button class="btn-send" onclick="sendMessage()">Send</button>
        <button class="btn-clear" onclick="clearLog()">Clear</button>
      </div>
      <div class="log" id="log"></div>
    </div>

    <div class="panel">
      <h1>📊 Stats</h1>
      <div class="metrics">
        <div class="metric"><div class="metric-val" id="sentCount">0</div><div class="metric-label">Sent</div></div>
        <div class="metric"><div class="metric-val" id="recvCount">0</div><div class="metric-label">Received</div></div>
        <div class="metric"><div class="metric-val" id="totalBytes">0</div><div class="metric-label">Bytes</div></div>
        <div class="metric"><div class="metric-val" id="latency">-</div><div class="metric-label">Avg Latency</div></div>
      </div>
    </div>
  </div>

  <script>
    let ws = null;
    let sent = 0, recv = 0, bytes = 0, latencies = [];

    function setUrl(url) { document.getElementById('url').value = url; }

    function toggleConnect() {
      if (ws) {
        ws.close();
        return;
      }
      const url = document.getElementById('url').value;
      addLog('system', `Connecting to ${url}...`);

      try {
        ws = new WebSocket(url);
        ws.onopen = () => {
          document.getElementById('statusDot').classList.add('connected');
          document.getElementById('statusText').textContent = 'Connected';
          document.getElementById('connectBtn').textContent = 'Disconnect';
          document.getElementById('connectBtn').className = 'btn-disconnect';
          addLog('system', 'Connected!');
        };
        ws.onmessage = (e) => {
          recv++;
          bytes += e.data.length;
          addLog('received', `< ${e.data}`);
          updateStats();
        };
        ws.onerror = (e) => {
          document.getElementById('statusDot').classList.add('error');
          addLog('error', 'Error occurred');
        };
        ws.onclose = () => {
          document.getElementById('statusDot').classList.remove('connected');
          document.getElementById('statusText').textContent = 'Disconnected';
          document.getElementById('connectBtn').textContent = 'Connect';
          document.getElementById('connectBtn').className = 'btn-connect';
          addLog('system', 'Disconnected');
          ws = null;
        };
      } catch (err) {
        addLog('error', err.message);
      }
    }

    function sendMessage() {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        addLog('error', 'Not connected');
        return;
      }
      const msg = document.getElementById('message').value;
      const start = performance.now();
      ws.send(msg);
      sent++;
      bytes += msg.length;
      addLog('sent', `> ${msg}`);
      setTimeout(() => {
        latencies.push(performance.now() - start);
        if (latencies.length > 100) latencies.shift();
        const avg = latencies.reduce((a,b)=>a+b,0)/latencies.length;
        document.getElementById('latency').textContent = Math.round(avg)+'ms';
      }, 100);
      updateStats();
    }

    function addLog(type, msg) {
      const div = document.createElement('div');
      div.className = `log-entry ${type}`;
      const time = new Date().toLocaleTimeString();
      div.innerHTML = `<span class="log-time">${time}</span>${msg}`;
      document.getElementById('log').prepend(div);
    }

    function clearLog() { document.getElementById('log').innerHTML = ''; }

    function updateStats() {
      document.getElementById('sentCount').textContent = sent;
      document.getElementById('recvCount').textContent = recv;
      document.getElementById('totalBytes').textContent = (bytes/1024).toFixed(1)+'KB';
    }
  </script>
</body>
</html>
