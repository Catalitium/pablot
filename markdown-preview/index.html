<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Markdown Preview</title><link rel="stylesheet" href="style.css"></head>
<body>
<main class="app">
<h1>Markdown Preview</h1>
<section class="toolbar panel"><button id="clearBtn" type="button">Clear</button><button id="copyBtn" type="button">Copy HTML</button><button id="downloadBtn" type="button">Download .md</button><p id="status"></p></section>
<section class="split"><article class="panel"><h2>Editor</h2><textarea id="editor" rows="18"></textarea></article><article class="panel"><h2>Preview</h2><div id="preview"></div></article></section>
</main>
<script src="script.js"></script>
</body></html>
