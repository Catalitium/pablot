<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terrain Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <section class="controls">
      <h1>Terrain Generator</h1>
      <label>Seed <input id="seed" type="text" value="42"></label>
      <label>Octaves <input id="octaves" type="number" value="4" min="1" max="7"></label>
      <label>Scale <input id="scale" type="number" value="0.045" min="0.01" max="0.2" step="0.001"></label>
      <label>Amplitude <input id="amplitude" type="number" value="36" min="6" max="80"></label>
      <label>Grid <input id="grid" type="number" value="96" min="32" max="192"></label>
      <button id="regen" type="button">Regenerate</button>
      <p id="status" class="status neutral">Ready.</p>
    </section>
    <section class="viewport">
      <canvas id="scene" aria-label="Terrain viewport"></canvas>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
